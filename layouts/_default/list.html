{{ define "main" }}
<div class="simple-shell">
  <header class="topbar">
    <a class="brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
  </header>
  <main class="simple-content">
    <p class="eyebrow">Archive</p>
    <h1>{{ .Title }}</h1>
    <div class="stack-list">
      {{ range .Pages }}
      <article class="list-card">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p>{{ .Summary }}</p>
      </article>
      {{ end }}
    </div>
  </main>
</div>
{{ end }}
