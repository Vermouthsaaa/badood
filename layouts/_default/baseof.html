<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default `en` }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  {{ with .Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  <link rel="icon" type="image/png" href="{{ `img/favicon.png` | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ `paper.css` | relURL }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
